<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Max Pilav Halil Usta | Hesap Yönetimi</title>
    <meta name="description" content="Max Pilav Halil Usta - Hesap ve adisyon oluşturma paneli." />
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="hesap.css" />
</head>
<body>

<!-- ═══ TOP BAR ═══ -->
<header class="topbar">
    <div class="topbar-left">
        <img src="logo.png" alt="Logo" />
        <div>
            <div class="shop-name">Max Pilav Halil Usta</div>
            <div class="shop-sub">Hesap & Adisyon Paneli</div>
        </div>
    </div>
    <div class="topbar-right">
        <button class="topbar-btn" id="btn-zrapor" onclick="openZReport()">📊 Z Raporu</button>
        <button class="topbar-btn" id="btn-products" onclick="openProductManager()">⚙️ Ürünler</button>
        <button class="topbar-btn" id="btn-history" onclick="toggleHistory()">📋 Geçmiş</button>
        <a class="topbar-btn" href="index.html">🏠 Ana Sayfa</a>
    </div>
</header>

<!-- ═══ MAIN LAYOUT ═══ -->
<main class="app-layout">

    <!-- LEFT: MENU ITEMS -->
    <section class="menu-panel" id="menu-panel"></section>

    <!-- RIGHT: STAGING + BILL -->
    <aside class="cart-panel">
        <!-- MAIN BILL (HESAP) -->
        <div class="bill-section">
            <div class="cart-header">
                <h2>🧾 Hesap <span class="cart-count" id="cart-count">0</span></h2>
                <button class="cart-clear" id="btn-clear" onclick="clearCart()">Temizle</button>
            </div>
            <div class="cart-items" id="cart-items">
                <div class="cart-empty" id="cart-empty">
                    <div class="empty-icon">🛒</div>
                    Sipariş oluşturup hesaba ekleyin
                </div>
            </div>
            <div class="cart-footer">
                <div class="cart-total-row">
                    <span class="cart-total-label">Toplam</span>
                    <span class="cart-total-val" id="cart-total">₺0</span>
                </div>
                <div class="payment-row">
                    <label class="payment-label">💳 Ödeme</label>
                    <div class="payment-segmented" id="payment-segmented">
                        <div class="pay-seg-btn active" onclick="setPaymentType('nakit')">💵 Nakit</div>
                        <div class="pay-seg-btn" onclick="setPaymentType('kart')">💳 Kart</div>
                    </div>
                    <input type="hidden" id="payment-type" value="nakit" />
                </div>
                <div class="payment-row">
                    <label class="payment-label" for="paid-amount">💵 Alınan</label>
                    <div class="payment-input-wrap">
                        <span class="payment-currency">₺</span>
                        <input type="number" id="paid-amount" class="payment-input" placeholder="0" min="0" oninput="calcChange()" />
                    </div>
                </div>
                <div class="change-row" id="change-row">
                    <span class="change-label">Para Üstü</span>
                    <span class="change-val" id="change-val">₺0</span>
                </div>
                <button class="btn-save" id="btn-save" disabled onclick="saveReceipt()">
                    💾 Hesabı Kaydet &amp; Yazdır
                </button>
            </div>
        </div>
    </aside>
</main>

<!-- ═══ HISTORY MODAL ═══ -->
<div class="history-overlay" id="history-overlay" onclick="closeHistoryOutside(event)">
    <div class="history-modal">
        <div class="history-header">
            <h2>📋 Hesap Geçmişi</h2>
            <button class="history-close" onclick="toggleHistory()">&times;</button>
        </div>
        <div class="history-body" id="history-body"></div>
    </div>
</div>

<!-- ═══ RECEIPT MODAL ═══ -->
<div class="receipt-overlay" id="receipt-overlay">
    <div>
        <div class="receipt-box" id="receipt-box"></div>
        <div class="receipt-actions">
            <button class="btn-print" onclick="printReceipt()">🖨️ Yazdır</button>
            <button class="btn-close-receipt" onclick="closeReceipt()">Kapat</button>
        </div>
    </div>
</div>

<!-- ═══ Z REPORT MODAL ═══ -->
<div class="zreport-overlay" id="zreport-overlay" onclick="closeZReportOutside(event)">
    <div class="zreport-modal">
        <div class="zreport-header">
            <h2>📊 Z Raporu (Gün Sonu)</h2>
            <button class="history-close" onclick="closeZReport()">&times;</button>
        </div>
        <div class="zreport-filters">
            <div class="zreport-filter-row">
                <label>📅 Tarih:</label>
                <select id="zreport-range" onchange="handleZReportRange()">
                    <option value="today">Bugün</option>
                    <option value="yesterday">Dün</option>
                    <option value="week">Bu Hafta</option>
                    <option value="month">Bu Ay</option>
                    <option value="custom">Özel Tarih</option>
                </select>
            </div>
            <div class="zreport-custom-dates" id="zreport-custom-dates" style="display:none">
                <input type="date" id="zreport-start" />
                <span>→</span>
                <input type="date" id="zreport-end" />
                <button class="topbar-btn" onclick="generateZReport()">Filtrele</button>
            </div>
            <div class="zreport-auto-row">
                <label class="auto-toggle">
                    <input type="checkbox" id="auto-zprint-toggle" onchange="saveAutoZSettings()" />
                    <span class="toggle-slider"></span>
                </label>
                <span class="auto-label">⏰ Otomatik Yazdır:</span>
                <input type="time" id="auto-zprint-time" value="23:30" onchange="saveAutoZSettings()" />
                <span class="auto-status" id="auto-zprint-status"></span>
            </div>
        </div>
        <div class="zreport-body" id="zreport-body"></div>
        <div class="zreport-actions">
            <button class="btn-print" onclick="previewZReport()">🧾 Görüntüle & Yazdır</button>
            <button class="btn-close-receipt" onclick="closeZReport()">Kapat</button>
        </div>
    </div>
</div>

<!-- ═══ Z REPORT PRINT BOX (preview, then print) ═══ -->
<div class="receipt-overlay" id="zprint-overlay">
    <div>
        <div class="receipt-box" id="zprint-box"></div>
        <div class="receipt-actions">
            <button class="btn-print" onclick="printZReport()">🖨️ Yazdır</button>
            <button class="btn-print" style="background:#2563eb" onclick="downloadZReportPDF()">📄 PDF İndir</button>
            <button class="btn-close-receipt" onclick="closeZPrint()">Kapat</button>
        </div>
    </div>
</div>

<!-- ═══ PRODUCT MANAGEMENT MODAL ═══ -->
<div class="prod-overlay" id="prod-overlay" onclick="closeProdOutside(event)">
    <div class="prod-modal">
        <div class="prod-header">
            <h2>⚙️ Ürün Yönetimi</h2>
            <button class="history-close" onclick="closeProductManager()">&times;</button>
        </div>
        <div class="prod-toolbar">
            <button class="topbar-btn" onclick="showAddProductForm()">➕ Yeni Ürün</button>
            <button class="topbar-btn" onclick="resetAllProducts()">🔄 Tümünü Varsayılana Dön</button>
        </div>
        <div class="prod-body" id="prod-body"></div>
    </div>
</div>

<!-- ═══ TOAST ═══ -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   STATE
   ══════════════════════════════════════ */
let menuData = null;
let cart = [];     // confirmed bill items

/* ══════════════════════════════════════
   INDEXED DB SETUP
   ══════════════════════════════════════ */
const DB_NAME = 'MaxPilavDB';
const DB_VERSION = 2;
const STORE_NAME = 'receipts';
const PRODUCT_STORE = 'products';
let db = null;
let defaultCategories = []; // data.json'dan gelen orijinal ürünler

function openDB() {
    return new Promise((resolve, reject) => {
        if (db) { resolve(db); return; }
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains(STORE_NAME)) {
                const store = database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                store.createIndex('date', 'date', { unique: false });
            }
            if (!database.objectStoreNames.contains(PRODUCT_STORE)) {
                database.createObjectStore(PRODUCT_STORE, { keyPath: 'name' });
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            resolve(db);
        };
        request.onerror = (e) => {
            console.error('IndexedDB açılamadı:', e.target.error);
            reject(e.target.error);
        };
    });
}

// ── Receipt CRUD ──
async function getHistory() {
    const database = await openDB();
    return new Promise((resolve, reject) => {
        const tx = database.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();
        request.onsuccess = () => {
            const results = request.result || [];
            results.sort((a, b) => new Date(b.date) - new Date(a.date));
            resolve(results);
        };
        request.onerror = () => reject(request.error);
    });
}

async function addReceipt(receipt) {
    const database = await openDB();
    return new Promise((resolve, reject) => {
        const tx = database.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const request = store.add(receipt);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
    });
}

async function removeReceipt(id) {
    const database = await openDB();
    return new Promise((resolve, reject) => {
        const tx = database.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const request = store.delete(id);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
    });
}

async function getReceiptCount() {
    const database = await openDB();
    return new Promise((resolve, reject) => {
        const tx = database.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.count();
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

// ── Product CRUD (IndexedDB) ──
async function getAllProducts() {
    const database = await openDB();
    return new Promise((resolve, reject) => {
        const tx = database.transaction(PRODUCT_STORE, 'readonly');
        const store = tx.objectStore(PRODUCT_STORE);
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result || []);
        request.onerror = () => reject(request.error);
    });
}

async function saveProduct(product) {
    const database = await openDB();
    return new Promise((resolve, reject) => {
        const tx = database.transaction(PRODUCT_STORE, 'readwrite');
        const store = tx.objectStore(PRODUCT_STORE);
        const request = store.put(product);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
    });
}

async function removeProduct(name) {
    const database = await openDB();
    return new Promise((resolve, reject) => {
        const tx = database.transaction(PRODUCT_STORE, 'readwrite');
        const store = tx.objectStore(PRODUCT_STORE);
        const request = store.delete(name);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
    });
}

async function clearAllProducts() {
    const database = await openDB();
    return new Promise((resolve, reject) => {
        const tx = database.transaction(PRODUCT_STORE, 'readwrite');
        const store = tx.objectStore(PRODUCT_STORE);
        const request = store.clear();
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
    });
}

// DB'yi başlat
openDB().catch(err => console.error('DB başlatılamadı:', err));

/* ══════════════════════════════════════
   MERGE: data.json + IndexedDB
   ══════════════════════════════════════ */
async function getMergedCategories() {
    const overrides = await getAllProducts();
    const overrideMap = {};
    const customProducts = [];
    overrides.forEach(p => {
        if (p.isCustom) {
            customProducts.push(p);
        } else {
            overrideMap[p.name] = p;
        }
    });

    // Clone defaults and apply overrides
    const merged = defaultCategories.map(cat => {
        const items = cat.items.map(item => {
            const ov = overrideMap[item.name];
            if (ov) {
                return { ...item, price: ov.price, desc: ov.desc, emoji: ov.emoji, _modified: true };
            }
            return { ...item };
        });
        return { ...cat, items };
    });

    // Group custom products by category
    const customByCat = {};
    customProducts.forEach(p => {
        const catId = p.category || 'ozel';
        if (!customByCat[catId]) customByCat[catId] = [];
        customByCat[catId].push(p);
    });

    // Add custom products to existing categories or create new ones
    for (const [catId, products] of Object.entries(customByCat)) {
        const existingCat = merged.find(c => c.id === catId);
        if (existingCat) {
            products.forEach(p => {
                existingCat.items.push({ name: p.name, emoji: p.emoji, desc: p.desc, price: p.price, _modified: true, _custom: true });
            });
        } else {
            merged.push({
                id: catId,
                label: '⭐ Özel Ürünler',
                items: products.map(p => ({ name: p.name, emoji: p.emoji, desc: p.desc, price: p.price, _modified: true, _custom: true }))
            });
        }
    }

    return merged;
}

/* ══════════════════════════════════════
   INIT
   ══════════════════════════════════════ */
async function initApp() {
    try {
        const resp = await fetch('data.json');
        const data = await resp.json();
        menuData = data;
        defaultCategories = JSON.parse(JSON.stringify(data.menu.categories)); // deep clone
        const merged = await getMergedCategories();
        buildMenuPanel(merged);
    } catch (err) {
        console.error('Başlatma hatası:', err);
    }
}

initApp();

/* ══════════════════════════════════════
   BUILD MENU
   ══════════════════════════════════════ */
function buildMenuPanel(categories) {
    const panel = document.getElementById('menu-panel');
    panel.innerHTML = '';
    categories.forEach(cat => {
        const title = document.createElement('div');
        title.className = 'cat-title';
        title.textContent = cat.label;
        panel.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'items-grid';

        cat.items.forEach(item => {
            item._catId = cat.id; // store category reference
            const btn = document.createElement('div');
            btn.className = 'item-btn';
            
            const hasPortions = (item._catId !== 'icecekler' && item._catId !== 'yan-urunler');
            
            btn.innerHTML = `
                <div class="item-main">
                    <div class="emoji">${item.emoji}</div>
                    <div class="name">${item.name}</div>
                    <div class="price">₺${item.price}</div>
                </div>
                ${hasPortions ? `
                <div class="item-portions" id="portions-${item.name.replace(/\s/g, '_')}">
                    <div class="ps-btn" data-p="0.5">Yarım</div>
                    <div class="ps-btn" data-p="1">Tam</div>
                    <div class="ps-btn" data-p="1.5">1.5</div>
                </div>
                ` : ''}
            `;
            
            if (hasPortions) {
                const pBtns = btn.querySelectorAll('.ps-btn');
                pBtns.forEach(pBtn => {
                    pBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        addToCart(item, parseFloat(pBtn.dataset.p));
                        createRipple(e, pBtn);
                    });
                });
            } else {
                btn.addEventListener('click', (e) => {
                    addToCart(item, 1);
                    createRipple(e, btn);
                });
            }

            // Right-click quick edit
            btn.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                showQuickEdit(e, item);
            });
            // Long press for mobile
            let longPressTimer;
            btn.addEventListener('touchstart', (e) => {
                longPressTimer = setTimeout(() => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    showQuickEdit({ clientX: touch.clientX, clientY: touch.clientY }, item);
                }, 600);
            }, { passive: false });
            btn.addEventListener('touchend', () => clearTimeout(longPressTimer));
            btn.addEventListener('touchmove', () => clearTimeout(longPressTimer));
            grid.appendChild(btn);
        });
        panel.appendChild(grid);
    });
}

/* ══════════════════════════════════════
   PORTION HELPERS
   ══════════════════════════════════════ */
function getPortionLabel(p) {
    if (p === 0.5) return '½';
    if (p === 1) return '1';
    if (p === 1.5) return '1½';
    return p.toString();
}

function getPortionText(p) {
    if (p === 0.5) return 'Yarım';
    if (p === 1) return 'Tam';
    if (p === 1.5) return '1.5';
    return p.toString();
}

function calcItemPrice(item) {
    return Math.round(item.basePrice * item.portion);
}

function setPaymentType(type) {
    document.getElementById('payment-type').value = type;
    const btns = document.querySelectorAll('.pay-seg-btn');
    btns[0].classList.toggle('active', type === 'nakit');
    btns[1].classList.toggle('active', type === 'kart');
}

function addToCart(item, portion) {
    const existing = cart.find(c => c.name === item.name && c.portion === portion);
    if (existing) {
        existing.qty++;
    } else {
        cart.push({
            name: item.name,
            emoji: item.emoji,
            basePrice: item.price,
            portion: portion,
            qty: 1
        });
    }
    renderCart();
    showToast(`${item.emoji} ${item.name} ${getPortionLabel(portion)} eklendi`, 'success');
}

/* ══════════════════════════════════════
   CART / BILL LOGIC (Hesap)
   ══════════════════════════════════════ */
function updateCartQty(index, delta) {
    cart[index].qty += delta;
    if (cart[index].qty <= 0) {
        cart.splice(index, 1);
    }
    renderCart();
}

function clearCart() {
    cart = [];
    renderCart();
}

function renderCart() {
    const container = document.getElementById('cart-items');
    const countEl = document.getElementById('cart-count');
    const totalEl = document.getElementById('cart-total');
    const saveBtn = document.getElementById('btn-save');

    const totalItems = cart.reduce((s, c) => s + c.qty, 0);
    const totalPrice = cart.reduce((s, c) => s + calcItemPrice(c) * c.qty, 0);

    countEl.textContent = totalItems;
    totalEl.textContent = '₺' + totalPrice;
    saveBtn.disabled = cart.length === 0;

    // Reset ödeme alanı
    document.getElementById('paid-amount').value = '';
    calcChange();

    if (cart.length === 0) {
        container.innerHTML = `<div class="cart-empty"><div class="empty-icon">🛒</div>Sipariş oluşturup hesaba ekleyin</div>`;
        return;
    }

    container.innerHTML = cart.map((c, i) => {
        const unitPrice = calcItemPrice(c);
        const lineTotal = unitPrice * c.qty;
        const portionBadge = c.portion !== 1 ? `<span class="portion-tag">${getPortionText(c.portion)}</span>` : '';
        return `
        <div class="cart-item">
            <div class="cart-item-info">
                <div class="cart-item-name">${c.emoji} ${c.name} ${portionBadge}</div>
                <div class="cart-item-price">₺${c.basePrice} × ${getPortionLabel(c.portion)} = ₺${unitPrice}</div>
            </div>
            <div class="qty-controls">
                <button class="qty-btn minus" onclick="updateCartQty(${i}, -1)">−</button>
                <span class="qty-val">${c.qty}</span>
                <button class="qty-btn" onclick="updateCartQty(${i}, 1)">+</button>
            </div>
            <div class="cart-item-total">₺${lineTotal}</div>
        </div>`;
    }).join('');
}

/* ══════════════════════════════════════
   SAVE RECEIPT
   ══════════════════════════════════════ */
async function saveReceipt() {
    if (cart.length === 0) return;

    const now = new Date();
    const count = await getReceiptCount();
    const counter = (count + 1).toString().padStart(4, '0');
    const id = `MP-${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}-${counter}`;

    const total = cart.reduce((s, c) => s + calcItemPrice(c) * c.qty, 0);
    const paidInput = document.getElementById('paid-amount');
    const paid = parseFloat(paidInput.value) || 0;
    const change = paid > 0 ? paid - total : 0;

    // Flatten cart items for receipt storage
    const receiptItems = cart.map(c => ({
        name: c.name + (c.portion !== 1 ? ' (' + getPortionText(c.portion) + ')' : ''),
        emoji: c.emoji,
        price: calcItemPrice(c),
        basePrice: c.basePrice,
        portion: c.portion,
        qty: c.qty
    }));

    const paymentType = document.getElementById('payment-type').value;

    const receipt = {
        id: id,
        date: now.toISOString(),
        items: receiptItems,
        total: total,
        itemCount: cart.reduce((s, c) => s + c.qty, 0),
        paid: paid,
        change: change,
        paymentType: paymentType
    };

    try {
        await addReceipt(receipt);
        showReceipt(receipt);
        cart = [];
        renderCart();
        setPaymentType('nakit');
        showToast('✅ Hesap kaydedildi!', 'success');
    } catch (err) {
        console.error('Hesap kaydedilemedi:', err);
        showToast('❌ Kayıt hatası!', '');
    }
}

/* ══════════════════════════════════════
   RECEIPT DISPLAY
   ══════════════════════════════════════ */
function showReceipt(receipt) {
    const d = new Date(receipt.date);
    const timeStr = d.toLocaleTimeString('tr-TR', { hour:'2-digit', minute:'2-digit' });
    const dateStr = d.toLocaleDateString('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric' });

    const box = document.getElementById('receipt-box');
    box.innerHTML = `
        <div class="r-header">
            <div class="r-shop">Max Pilav Halil Usta</div>
            <div class="r-sub">Sultanbeyli / İstanbul</div>
        </div>
        <hr class="r-divider"/>
        <div class="r-row"><span>Fiş No:</span><span>${receipt.id}</span></div>
        <div class="r-row"><span>Tarih:</span><span>${dateStr}</span></div>
        <div class="r-row"><span>Saat:</span><span>${timeStr}</span></div>
        <div class="r-row"><span>Ürün Sayısı:</span><span>${receipt.itemCount}</span></div>
        <hr class="r-divider"/>
        ${receipt.items.map(it => `
            <div class="r-row">
                <span>${it.name} x${it.qty}</span>
                <span>₺${it.price * it.qty}</span>
            </div>
        `).join('')}
        <hr class="r-divider"/>
        <div class="r-total-row">
            <span>TOPLAM</span>
            <span>₺${receipt.total.toFixed(2)}</span>
        </div>
        <div class="r-row" style="font-size:10px;">
            <span>Ödeme Tipi:</span>
            <span>${receipt.paymentType === 'kart' ? 'Kredi Kartı' : 'Nakit'}</span>
        </div>
        ${receipt.paid > 0 ? `
        <div class="r-row"><span>Alınan:</span><span>₺${receipt.paid.toFixed(2)}</span></div>
        <div class="r-row" style="font-weight:900;color:#000"><span>Para Üstü:</span><span>₺${receipt.change.toFixed(2)}</span></div>

   ══════════════════════════════════════ */
async function toggleHistory() {
    const overlay = document.getElementById('history-overlay');
    const isOpen = overlay.classList.contains('show');
    if (isOpen) {
        overlay.classList.remove('show');
    } else {
        await renderHistory();
        overlay.classList.add('show');
    }
}

function closeHistoryOutside(e) {
    if (e.target === document.getElementById('history-overlay')) {
        toggleHistory();
    }
}

async function renderHistory() {
    const body = document.getElementById('history-body');
    const history = await getHistory();

    if (history.length === 0) {
        body.innerHTML = '<div class="history-empty">📭 Henüz kayıtlı hesap yok</div>';
        return;
    }

    // Group by month-year
    const groups = {};
    history.forEach(r => {
        const d = new Date(r.date);
        const key = d.toLocaleDateString('tr-TR', { month:'long', year:'numeric' });
        if (!groups[key]) groups[key] = [];
        groups[key].push(r);
    });

    let html = '';
    for (const [group, receipts] of Object.entries(groups)) {
        html += `<div class="history-group-title">📅 ${group}</div>`;
        receipts.forEach(r => {
            const d = new Date(r.date);
            const timeStr = d.toLocaleTimeString('tr-TR', { hour:'2-digit', minute:'2-digit' });
            const dateStr = d.toLocaleDateString('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric' });
            const itemsSummary = r.items.map(it => `${it.name} x${it.qty}`).join(', ');

            const pt = r.paymentType === 'kart' ? '💳 Kart' : '💵 Nakit';
            const ptColor = r.paymentType === 'kart' ? '#3b82f6' : '#22c55e';

            html += `
                <div class="history-card">
                    <div class="history-card-top">
                        <span class="history-card-id">${r.id}</span>
                        <span class="history-card-time">${dateStr} • ${timeStr}</span>
                    </div>
                    <div class="history-card-items">${itemsSummary}</div>
                    <div class="history-card-bottom">
                        <span class="history-card-total">₺${r.total} <span style="font-size:0.75rem; color:${ptColor}; margin-left:4px;">(${pt})</span></span>
                        <div class="history-card-actions">
                            <button class="hc-btn" onclick="viewReceipt('${r.id}')">🧾 Görüntüle</button>
                            <button class="hc-btn delete" onclick="deleteReceipt('${r.id}')">🗑️ Sil</button>
                        </div>
                    </div>
                </div>
            `;
        });
    }
    body.innerHTML = html;
}

async function viewReceipt(id) {
    const history = await getHistory();
    const receipt = history.find(r => r.id === id);
    if (receipt) {
        showReceipt(receipt);
    }
}

async function deleteReceipt(id) {
    if (!confirm('Bu hesabı silmek istediğinize emin misiniz?')) return;
    try {
        await removeReceipt(id);
        await renderHistory();
        showToast('🗑️ Hesap silindi', '');
    } catch (err) {
        console.error('Silme hatası:', err);
        showToast('❌ Silme hatası!', '');
    }
}

function calcChange() {
    const totalPrice = cart.reduce((s, c) => s + calcItemPrice(c) * c.qty, 0);
    const paid = parseFloat(document.getElementById('paid-amount').value) || 0;
    const change = paid - totalPrice;
    const changeEl = document.getElementById('change-val');
    const changeRow = document.getElementById('change-row');

    if (paid > 0) {
        changeEl.textContent = '₺' + change.toFixed(2);
        changeRow.style.display = 'flex';
        if (change < 0) {
            changeEl.style.color = '#ef4444';
        } else {
            changeEl.style.color = '#22c55e';
        }
    } else {
        changeEl.textContent = '₺0';
        changeEl.style.color = 'var(--text2)';
    }
}

/* ══════════════════════════════════════
   UTILS
   ══════════════════════════════════════ */
function createRipple(e, el) {
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const rect = el.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
    el.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
}

function showToast(msg, type) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show' + (type ? ' ' + type : '');
    setTimeout(() => { toast.className = 'toast'; }, 2500);
}

function getDateRange() {
    const sel = document.getElementById('zreport-range').value;
    const now = new Date();
    let start, end;

    if (sel === 'today') {
        start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
        end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
    } else if (sel === 'yesterday') {
        const y = new Date(now);
        y.setDate(y.getDate() - 1);
        start = new Date(y.getFullYear(), y.getMonth(), y.getDate(), 0, 0, 0);
        end = new Date(y.getFullYear(), y.getMonth(), y.getDate(), 23, 59, 59);
    } else if (sel === 'week') {
        const day = now.getDay() || 7;
        start = new Date(now);
        start.setDate(now.getDate() - day + 1);
        start.setHours(0, 0, 0, 0);
        end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
    } else if (sel === 'month') {
        start = new Date(now.getFullYear(), now.getMonth(), 1, 0, 0, 0);
        end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
    } else {
        const sv = document.getElementById('zreport-start').value;
        const ev = document.getElementById('zreport-end').value;
        if (!sv || !ev) return null;
        start = new Date(sv + 'T00:00:00');
        end = new Date(ev + 'T23:59:59');
    }
    return { start, end };
}

async function generateZReport() {
    const range = getDateRange();
    if (!range) {
        document.getElementById('zreport-body').innerHTML = '<div class="history-empty">📅 Tarih aralığı seçin</div>';
        return;
    }

    const allReceipts = await getHistory();
    const filtered = allReceipts.filter(r => {
        const d = new Date(r.date);
        return d >= range.start && d <= range.end;
    });

    const body = document.getElementById('zreport-body');

    if (filtered.length === 0) {
        body.innerHTML = '<div class="history-empty">📭 Seçilen tarihte hesap bulunamadı</div>';
        return;
    }

    // Hesaplamalar
    const totalRevenue = filtered.reduce((s, r) => s + r.total, 0);
    const totalItems = filtered.reduce((s, r) => s + r.itemCount, 0);
    const avgTicket = totalRevenue / filtered.length;
    const totalPaid = filtered.reduce((s, r) => s + (r.paid || 0), 0);
    const totalChange = filtered.reduce((s, r) => s + (r.change || 0), 0);

    // Ürün bazlı döküm
    const productMap = {};
    filtered.forEach(r => {
        r.items.forEach(it => {
            if (!productMap[it.name]) {
                productMap[it.name] = { qty: 0, revenue: 0, emoji: it.emoji || '' };
            }
            productMap[it.name].qty += it.qty;
            productMap[it.name].revenue += it.price * it.qty;
        });
    });

    // En çok satan ürünler (sıralı)
    const sortedProducts = Object.entries(productMap)
        .sort((a, b) => b[1].qty - a[1].qty);

    const topSeller = sortedProducts[0];

    // Saat bazlı dağılım
    const hourMap = {};
    filtered.forEach(r => {
        const h = new Date(r.date).getHours();
        const key = h.toString().padStart(2, '0') + ':00';
        if (!hourMap[key]) hourMap[key] = { count: 0, total: 0 };
        hourMap[key].count++;
        hourMap[key].total += r.total;
    });

    const dateLabel = range.start.toLocaleDateString('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric' })
        + (range.start.toDateString() !== range.end.toDateString()
            ? ' - ' + range.end.toLocaleDateString('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric' })
            : '');

    body.innerHTML = `
        <div class="zr-summary">
            <div class="zr-date-label">📅 ${dateLabel}</div>
            <div class="zr-stats-grid">
                <div class="zr-stat">
                    <div class="zr-stat-val">₺${totalRevenue.toFixed(2)}</div>
                    <div class="zr-stat-label">Toplam Ciro</div>
                </div>
                <div class="zr-stat">
                    <div class="zr-stat-val">${filtered.length}</div>
                    <div class="zr-stat-label">Fiş Sayısı</div>
                </div>
                <div class="zr-stat">
                    <div class="zr-stat-val">${totalItems}</div>
                    <div class="zr-stat-label">Ürün Adedi</div>
                </div>
                <div class="zr-stat">
                    <div class="zr-stat-val">₺${avgTicket.toFixed(2)}</div>
                    <div class="zr-stat-label">Ort. Fiş</div>
                </div>
            </div>
            ${topSeller ? `<div class="zr-top-seller">🏆 En Çok Satan: <strong>${topSeller[1].emoji} ${topSeller[0]}</strong> (${topSeller[1].qty} adet)</div>` : ''}
        </div>

        <div class="zr-section-title">📦 Ürün Bazlı Döküm</div>
        <table class="zr-table">
            <thead><tr><th>Ürün</th><th>Adet</th><th>Tutar</th></tr></thead>
            <tbody>
                ${sortedProducts.map(([name, data]) => `
                    <tr>
                        <td>${data.emoji} ${name}</td>
                        <td>${data.qty}</td>
                        <td>₺${data.revenue.toFixed(2)}</td>
                    </tr>
                `).join('')}
            </tbody>
            <tfoot>
                <tr><td><strong>TOPLAM</strong></td><td><strong>${totalItems}</strong></td><td><strong>₺${totalRevenue.toFixed(2)}</strong></td></tr>
            </tfoot>
        </table>

        <div class="zr-section-title">🕐 Saat Bazlı Dağılım</div>
        <table class="zr-table">
            <thead><tr><th>Saat</th><th>Fiş</th><th>Tutar</th></tr></thead>
            <tbody>
                ${Object.entries(hourMap).sort((a,b) => a[0].localeCompare(b[0])).map(([h, data]) => `
                    <tr><td>${h}</td><td>${data.count}</td><td>₺${data.total.toFixed(2)}</td></tr>
                `).join('')}
            </tbody>
        </table>

        <div class="zr-section-title">💰 Ödeme Özeti</div>
        <div class="zr-payment-summary">
            <div class="zr-pay-row"><span>Toplam Ciro:</span><span>₺${totalRevenue.toFixed(2)}</span></div>
            <div class="zr-pay-row"><span>Alınan Toplam:</span><span>₺${totalPaid.toFixed(2)}</span></div>
            <div class="zr-pay-row"><span>Verilen Para Üstü:</span><span>₺${totalChange.toFixed(2)}</span></div>
        </div>
    `;

    // Z raporu print box'ı hazırla

}

let autoZFired = false; // bugün zaten çalıştı mı?

function loadAutoZSettings() {

    if (saved) {
        const s = JSON.parse(saved);
        document.getElementById('auto-zprint-toggle').checked = s.enabled;

function saveAutoZSettings() {

    if (enabled) {
        showToast(`⏰ Z Raporu saat ${time}'de otomatik yazdırılacak`, 'success');
    } else {

function updateAutoZStatus() {
    const statusEl = document.getElementById('auto-zprint-status');
    const enabled = document.getElementById('auto-zprint-toggle').checked;

    if (enabled) {

// Her 30 saniyede kontrol et
setInterval(() => {
    const saved = localStorage.getItem('autoZPrint');
    if (!saved) return;
    const s = JSON.parse(saved);
    if (!s.enabled) return;

    const now = new Date();
    const [targetH, targetM] = s.time.split(':').map(Number);
    const nowH = now.getHours();
    const nowM = now.getMinutes();

    // Tam saatte veya 1 dk içinde tetikle (30sn aralıkla kontrol ettiğimiz için)
    if (nowH === targetH && nowM === targetM && !autoZFired) {
        autoZFired = true;
        autoTriggerZReport();
    }

    // Gün değiştiğinde resetle (gece yarısı)
    if (nowH === 0 && nowM === 0) {
        autoZFired = false;
    }
}, 30000);

async function autoTriggerZReport() {
    // 🔔 Ses bildirimi çal
    playNotificationSound();
    showToast('⏰ Gün sonu Z Raporu hazırlanıyor...', 'success');

    // Bugünü seç ve raporu oluştur

    await generateZReport();

    // Önizlemeyi aç

    // 📄 Önce PDF olarak otomatik indir (yedek)
    await downloadZReportPDF();

    // Kısa bekleyip yazdırma dialogunu aç

    }, 1000);
}

/* ══════════════════════════════════════
   SES BİLDİRİMİ (Web Audio API)
   ══════════════════════════════════════ */
function playNotificationSound() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const playBeep = (time, freq, duration) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = freq;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.4, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
            osc.start(time);
            osc.stop(time + duration);
        };
        // 3 bip sesi: dikkat çekici
        const now = ctx.currentTime;
        playBeep(now, 880, 0.15);        // bip 1
        playBeep(now + 0.2, 880, 0.15);  // bip 2
        playBeep(now + 0.4, 1175, 0.3);  // bip 3 (yüksek nota)
    } catch (e) {
        console.warn('Ses çalınamadı:', e);
    }
}

    + '.r-total-row { display:flex; justify-content:space-between; font-weight:900; font-size:15px; padding:2mm 0; border-top:2px solid #000; border-bottom:2px solid #000; margin:1.5mm 0; }'

    const blob = new Blob([htmlContent], { type: 'text/html; charset=utf-8' });

    if (win) {

    // Position
    let x = e.clientX, y = e.clientY;
    popup.style.left = Math.min(x, window.innerWidth - 250) + 'px';
    popup.style.top = Math.min(y, window.innerHeight - 200) + 'px';

    popup.innerHTML = `
        <div class="qe-title">${item.emoji} ${item.name}</div>
        <div class="qe-row"><label>Fiyat</label><input type="number" id="qe-price" value="${item.price}" min="0" /></div>
        <div class="qe-row"><label>Açıklama</label><input type="text" id="qe-desc" value="${item.desc || ''}" /></div>
        <div class="qe-row"><label>Emoji</label><input type="text" id="qe-emoji" value="${item.emoji}" /></div>
        <div class="qe-btns">
            <button class="qe-cancel" onclick="closeQuickEdit()">İptal</button>
            <button class="qe-save" id="qe-save-btn">💾 Kaydet</button>
        </div>
    `;
    document.body.appendChild(popup);

    // Save handler
    document.getElementById('qe-save-btn').addEventListener('click', async () => {
        const newPrice = parseFloat(document.getElementById('qe-price').value) || 0;
        const newDesc = document.getElementById('qe-desc').value.trim();
        const newEmoji = document.getElementById('qe-emoji').value.trim() || item.emoji;

        await saveProduct({
            name: item.name,
            emoji: newEmoji,
            desc: newDesc,
            price: newPrice,
            category: item._catId || '',
            isCustom: !!item._custom
        });

        closeQuickEdit();
        showToast(`✅ ${item.name} güncellendi!`, 'success');
        await refreshMenu();
    });

    // Click outside to close
    setTimeout(() => {
        document.addEventListener('click', quickEditOutsideHandler);
    }, 100);
}

function quickEditOutsideHandler(e) {
    const popup = document.getElementById('quick-edit-popup');
    if (popup && !popup.contains(e.target)) {
        closeQuickEdit();
    }
}

function closeQuickEdit() {
    const popup = document.getElementById('quick-edit-popup');
    if (popup) popup.remove();
    document.removeEventListener('click', quickEditOutsideHandler);
}

/* ══════════════════════════════════════
   REFRESH MENU (after product changes)
   ══════════════════════════════════════ */
async function refreshMenu() {
    const merged = await getMergedCategories();
    buildMenuPanel(merged);
}

/* ══════════════════════════════════════
   PRODUCT MANAGER MODAL
   ══════════════════════════════════════ */
function openProductManager() {
    document.getElementById('prod-overlay').classList.add('show');
    renderProductList();
}

function closeProductManager() {
    document.getElementById('prod-overlay').classList.remove('show');
}

function closeProdOutside(e) {
    if (e.target === document.getElementById('prod-overlay')) closeProductManager();
}

async function renderProductList() {
    const body = document.getElementById('prod-body');
    const overrides = await getAllProducts();
    const overrideMap = {};
    overrides.forEach(p => { overrideMap[p.name] = p; });

    let html = '';

    // Default categories with overrides
    defaultCategories.forEach(cat => {
        html += `<div class="prod-cat-title">${cat.label}</div>`;
        cat.items.forEach(item => {
            const ov = overrideMap[item.name];
            const isModified = !!ov && !ov.isCustom;
            const displayItem = ov ? { ...item, price: ov.price, desc: ov.desc, emoji: ov.emoji } : item;
            html += buildProdCard(displayItem, cat.id, isModified, false);
        });
    });

    // Custom products (not in data.json)
    const customProducts = overrides.filter(p => p.isCustom);
    if (customProducts.length > 0) {
        html += `<div class="prod-cat-title">⭐ Özel (Eklenen) Ürünler</div>`;
        customProducts.forEach(p => {
            html += buildProdCard({ name: p.name, emoji: p.emoji, desc: p.desc, price: p.price, _catId: p.category }, p.category, true, true);
        });
    }

    body.innerHTML = html;
}

function buildProdCard(item, catId, isModified, isCustom) {
    const modBadge = isModified ? `<span class="prod-modified-badge">${isCustom ? 'ÖZEL' : 'DÜZENLENDI'}</span>` : '';
    const escapedName = item.name.replace(/'/g, "\\'");
    return `
    <div class="prod-card ${isCustom ? 'custom' : ''}" id="pcard-${item.name.replace(/\s/g, '_')}">
        <div class="prod-emoji">${item.emoji}</div>
        <div class="prod-info">
            <div class="prod-name">${item.name}${modBadge}</div>
            <div class="prod-desc">${item.desc || ''}</div>
        </div>
        <div class="prod-price-badge">₺${item.price}</div>
        <div class="prod-actions">
            <button title="Düzenle" onclick="toggleEditForm('${escapedName}', '${catId}', ${isCustom})">✏️</button>
            ${isCustom ? `<button class="del" title="Sil" onclick="deleteCustomProduct('${escapedName}')">🗑️</button>` : ''}
            ${isModified && !isCustom ? `<button title="Varsayılana dön" onclick="resetProduct('${escapedName}')">↩️</button>` : ''}
        </div>
    </div>`;
}

function toggleEditForm(name, catId, isCustom) {
    const cardId = 'pcard-' + name.replace(/\s/g, '_');
    const card = document.getElementById(cardId);
    if (!card) return;

    // If already has form, toggle it
    const existing = card.querySelector('.prod-edit-form');
    if (existing) {
        existing.classList.toggle('show');
        card.classList.toggle('editing');
        return;
    }

    // Find current values
    let currentItem = null;
    defaultCategories.forEach(cat => {
        cat.items.forEach(item => {
            if (item.name === name) currentItem = { ...item };
        });
    });

    // Check IndexedDB override (use displayed values from the card)
    const priceText = card.querySelector('.prod-price-badge').textContent.replace('₺', '');
    const descText = card.querySelector('.prod-desc').textContent;
    const emojiText = card.querySelector('.prod-emoji').textContent.trim();

    const form = document.createElement('div');
    form.className = 'prod-edit-form show';
    form.innerHTML = `
        <div class="prod-edit-row"><label>Emoji</label><input type="text" id="pedit-emoji-${name.replace(/\s/g, '_')}" value="${emojiText}" /></div>
        <div class="prod-edit-row"><label>Açıklama</label><input type="text" id="pedit-desc-${name.replace(/\s/g, '_')}" value="${descText}" /></div>
        <div class="prod-edit-row"><label>Fiyat (₺)</label><input type="number" id="pedit-price-${name.replace(/\s/g, '_')}" value="${priceText}" min="0" /></div>
        ${isCustom ? `<div class="prod-edit-row"><label>Kategori</label>
            <select id="pedit-cat-${name.replace(/\s/g, '_')}">
                ${defaultCategories.map(c => `<option value="${c.id}" ${c.id === catId ? 'selected' : ''}>${c.label}</option>`).join('')}
                <option value="ozel" ${catId === 'ozel' ? 'selected' : ''}>⭐ Özel</option>
            </select>
        </div>` : ''}
        <div class="prod-edit-btns">
            ${!isCustom ? `<button class="btn-reset-prod" onclick="resetProduct('${name.replace(/'/g, "\\'")}')">↩️ Varsayılan</button>` : ''}
            <button class="btn-cancel-prod" onclick="this.closest('.prod-edit-form').classList.remove('show'); this.closest('.prod-card').classList.remove('editing');">İptal</button>
            <button class="btn-save-prod" onclick="saveEditedProduct('${name.replace(/'/g, "\\'")}', '${catId}', ${isCustom})">💾 Kaydet</button>
        </div>
    `;

    card.appendChild(form);
    card.classList.add('editing');
    // Make card layout wrap
    card.style.flexWrap = 'wrap';
}

async function saveEditedProduct(name, catId, isCustom) {
    const safeName = name.replace(/\s/g, '_');
    const emoji = document.getElementById('pedit-emoji-' + safeName)?.value.trim() || '🍽️';
    const desc = document.getElementById('pedit-desc-' + safeName)?.value.trim() || '';
    const price = parseFloat(document.getElementById('pedit-price-' + safeName)?.value) || 0;
    const newCat = document.getElementById('pedit-cat-' + safeName)?.value || catId;

    await saveProduct({
        name: name,
        emoji: emoji,
        desc: desc,
        price: price,
        category: newCat,
        isCustom: isCustom
    });

    showToast(`✅ ${name} kaydedildi!`, 'success');
    await renderProductList();
    await refreshMenu();
}

async function resetProduct(name) {
    await removeProduct(name);
    showToast(`↩️ ${name} varsayılana döndürüldü`, '');
    await renderProductList();
    await refreshMenu();
}

async function deleteCustomProduct(name) {
    if (!confirm(`"${name}" ürününü silmek istediğinize emin misiniz?`)) return;
    await removeProduct(name);
    showToast(`🗑️ ${name} silindi`, '');
    await renderProductList();
    await refreshMenu();
}

async function resetAllProducts() {
    if (!confirm('Tüm ürün değişikliklerini silip varsayılana dönmek istediğinize emin misiniz?')) return;
    await clearAllProducts();
    showToast('🔄 Tüm ürünler varsayılana döndürüldü', 'success');
    await renderProductList();
    await refreshMenu();
}

/* ══════════════════════════════════════
   ADD NEW PRODUCT
   ══════════════════════════════════════ */
function showAddProductForm() {
    const body = document.getElementById('prod-body');
    // Remove existing add form if any
    const existingForm = document.getElementById('add-product-form');
    if (existingForm) { existingForm.remove(); return; }

    const form = document.createElement('div');
    form.id = 'add-product-form';
    form.className = 'prod-card editing';
    form.style.flexWrap = 'wrap';
    form.style.borderColor = 'var(--green)';
    form.innerHTML = `
        <div style="width:100%;font-weight:700;font-size:0.9rem;margin-bottom:8px;">➕ Yeni Ürün Ekle</div>
        <div class="prod-edit-form show" style="border-top:none;margin-top:0;padding-top:0;">
            <div class="prod-edit-row"><label>İsim</label><input type="text" id="pnew-name" placeholder="Ürün adı" /></div>
            <div class="prod-edit-row"><label>Emoji</label><input type="text" id="pnew-emoji" value="🍽️" /></div>
            <div class="prod-edit-row"><label>Açıklama</label><input type="text" id="pnew-desc" placeholder="Kısa açıklama" /></div>
            <div class="prod-edit-row"><label>Fiyat (₺)</label><input type="number" id="pnew-price" placeholder="0" min="0" /></div>
            <div class="prod-edit-row"><label>Kategori</label>
                <select id="pnew-cat">
                    ${defaultCategories.map(c => `<option value="${c.id}">${c.label}</option>`).join('')}
                    <option value="ozel">⭐ Özel</option>
                </select>
            </div>
            <div class="prod-edit-btns">
                <button class="btn-cancel-prod" onclick="document.getElementById('add-product-form').remove()">İptal</button>
                <button class="btn-save-prod" onclick="addNewProduct()">💾 Ekle</button>
            </div>
        </div>
    `;
    body.insertBefore(form, body.firstChild);
    document.getElementById('pnew-name').focus();
}

async function addNewProduct() {
    const name = document.getElementById('pnew-name').value.trim();
    const emoji = document.getElementById('pnew-emoji').value.trim() || '🍽️';
    const desc = document.getElementById('pnew-desc').value.trim();
    const price = parseFloat(document.getElementById('pnew-price').value) || 0;
    const category = document.getElementById('pnew-cat').value;

    if (!name) {
        showToast('❌ Ürün adı boş olamaz!', '');
        return;
    }

    // Check if name already exists
    const allProds = await getAllProducts();
    const exists = allProds.some(p => p.name === name) || defaultCategories.some(c => c.items.some(i => i.name === name));
    if (exists) {
        showToast('❌ Bu isimde bir ürün zaten var!', '');
        return;
    }

    await saveProduct({
        name, emoji, desc, price, category, isCustom: true
    });

    showToast(`✅ ${name} eklendi!`, 'success');
    await renderProductList();
    await refreshMenu();
}

// Sayfa yüklenince ayarları yükle
loadAutoZSettings();
</script>
