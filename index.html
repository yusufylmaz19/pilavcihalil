<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilavcı Halil Usta</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <div id="logo-container" class="logo"></div>
            <ul class="nav-links">
                <li><a href="#hero">Ana Sayfa</a></li>
                <li><a href="#about">Hakkımızda</a></li>
                <li><a href="#menu">Menü</a></li>
                <li><a href="#contact">İletişim</a></li>
            </ul>
            <div class="burger">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header id="hero" class="hero-section">
        <div class="hero-overlay"></div>
        <div class="container hero-content" id="hero-content">
            <!-- Content injected via JS -->
        </div>
    </header>

    <!-- About Section -->
    <section id="about" class="section">
        <div class="container" id="about-content">
            <!-- Content injected via JS -->
        </div>
    </section>

    <!-- Menu Section -->
    <section id="menu" class="section bg-light">
        <div class="container">
            <h2 class="section-title">Lezzet Menümüz</h2>
            <div class="menu-grid" id="menu-grid">
                <!-- Menu items injected via JS -->
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="section">
        <div class="container">
            <h2 class="section-title">İletişim & Ulaşım</h2>
            <div class="contact-wrapper" id="contact-content">
                <!-- Contact info injected via JS -->
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; <span id="year"></span> Pilavcı Halil Usta. Tüm hakları saklıdır.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
